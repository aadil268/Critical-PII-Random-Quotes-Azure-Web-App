<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="quote-panel">
        <p class="badge">CRITICAL PII CONTROLLED DATA</p>
        <h1>{{ app_title }}</h1>
        <blockquote>
          <p>"{{ quote_text }}"</p>
          <footer>- {{ quote_author }}</footer>
        </blockquote>
        <a class="refresh" href="/">Show Another Quote</a>
      </section>
    </main>
  </body>
</html>
